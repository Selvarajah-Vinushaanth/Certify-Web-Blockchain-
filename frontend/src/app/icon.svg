<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#4F46E5"/>
  <!-- Certificate scroll -->
  <rect x="7" y="6" width="18" height="20" rx="2" fill="white" opacity="0.15"/>
  <rect x="7" y="6" width="18" height="20" rx="2" stroke="white" stroke-width="1.5"/>
  <!-- Lines on certificate -->
  <line x1="11" y1="12" x2="21" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="15.5" x2="21" y2="15.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="19" x2="17" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Seal/badge at bottom right -->
  <circle cx="21" cy="22" r="4" fill="#4F46E5" stroke="white" stroke-width="1.5"/>
  <polyline points="19,22 20.5,23.5 23,20.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
